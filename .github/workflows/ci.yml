name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同じブランチへ続けて push したら古い実行はキャンセルする。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # kopipe は Windows 専用（Win32 クリップボード API 依存）なので Windows で検証する。
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend checks (format, lint, tsc, tests)
        run: pnpm verify

      # generate_context!（Rust）はビルド時に frontendDist=../dist を要求するため、
      # cargo の前にフロントをビルドして dist/ を用意する。
      - name: Build frontend
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
